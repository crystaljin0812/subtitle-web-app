<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Gen - Web</title>
    <style>
        /* 基礎設定 */
        body {
            background-color: #FDFBF7;
            font-family: 'Helvetica', 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            color: #000;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* 標題設計 */
        h1 {
            font-size: 42px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        p.subtitle {
            font-weight: bold;
            color: #555;
            margin-bottom: 30px;
        }

        /* 大圓角黑框卡片 */
        .neo-card {
            border: 4px solid #000;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            /* 純色位移陰影 */
            box-shadow: 6px 6px 0px #000;
        }
        .card-purple { background-color: #F4CCFF; }
        .card-yellow { background-color: #FFEB84; }

        .neo-card h2 {
            margin-top: 0;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* 輸入框設計 */
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            margin-top: 16px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 3px solid #000;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            box-sizing: border-box; /* 避免超出邊界 */
        }
        input[type="file"] {
            background-color: #FFF;
            cursor: pointer;
        }

        /* 黑膠囊按鈕 */
        .submit-btn {
            width: 100%;
            background-color: #000;
            color: #AEEBCB;
            border: none;
            border-radius: 50px;
            padding: 20px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .submit-btn:hover {
            background-color: #333;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px #AEEBCB;
        }
        .submit-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* --- 斑馬線進度條設計 --- */
        #loading-container {
            display: none; /* 預設隱藏 */
            margin-top: 20px;
        }
        .progress-box {
            border: 4px solid #000;
            border-radius: 50px;
            overflow: hidden;
            background-color: #FFF;
            height: 40px;
        }
        .progress-bar {
            width: 100%;
            height: 100%;
            /* 薄荷綠與純黑交替的斜線 */
            background: repeating-linear-gradient(
                45deg,
                #AEEBCB,
                #AEEBCB 15px,
                #000 15px,
                #000 30px
            );
            /* 讓斑馬線無限滾動的動畫 */
            animation: move-stripes 1s linear infinite;
        }
        @keyframes move-stripes {
            0% { background-position: 0 0; }
            100% { background-position: 42.42px 0; }
        }
        .loading-text {
            text-align: center;
            font-weight: 900;
            font-size: 14px;
            margin-top: 12px;
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Generated<br>Captions</h1>
    <p class="subtitle">Transform audio to text instantly.</p>

    <!-- 改用 onsubmit 觸發 JS 邏輯，並拿掉傳統的 action 與 method -->
    <form id="upload-form" onsubmit="handleFormSubmit(event)">
        
        <!-- API 卡片 -->
        <div class="neo-card card-purple">
            <h2>API Keys</h2>
            <label>Gemini API</label>
            <input type="text" name="api_key" placeholder="AIzaSy..." required>
        </div>

        <!-- 檔案卡片 -->
        <div class="neo-card card-yellow">
            <h2>Files</h2>
            <label>Video / Audio File</label>
            <input type="file" name="video_file" accept="video/*,audio/*" required>
        </div>

        <!-- 提交按鈕 -->
        <button type="submit" id="submit-btn" class="submit-btn">PROCESS SUBTITLES</button>
        
        <!-- 隱藏的進度條區塊 -->
        <div id="loading-container">
            <div class="progress-box">
                <div class="progress-bar"></div>
            </div>
            <p class="loading-text">PROCESSING... DO NOT CLOSE THIS PAGE</p>
        </div>

    </form>
</div>

<!-- --- 前端 Fetch 邏輯 --- -->
<script>
    async function handleFormSubmit(event) {
        // 1. 阻止表單傳統的「換頁」行為
        event.preventDefault(); 

        const form = document.getElementById('upload-form');
        const btn = document.getElementById('submit-btn');
        const loadingBox = document.getElementById('loading-container');

        // 2. 點擊後：隱藏按鈕，顯示進度條動畫
        btn.style.display = 'none';
        loadingBox.style.display = 'block';

        try {
            // 3. 在背景將資料打包送給 Flask 伺服器
            const formData = new FormData(form);
            const response = await fetch('/process', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                // 如果發生錯誤 (例如密碼錯、沒檔案)，印出錯誤訊息
                const errorText = await response.text();
                alert('發生錯誤：' + errorText);
            } else {
                // 4. 成功收到字幕！將回傳的檔案轉換為可下載的 Blob
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');

                // 嘗試從後端抓取檔名，抓不到就預設叫 subtitle.srt
                let filename = "subtitle.srt";
                const disposition = response.headers.get('content-disposition');
                if (disposition && disposition.indexOf('filename=') !== -1) {
                    const matches = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/.exec(disposition);
                    if (matches != null && matches[1]) {
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }

                // 觸發隱藏下載動作
                a.href = downloadUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove(); 
                window.URL.revokeObjectURL(downloadUrl); // 釋放記憶體
            }
        } catch (error) {
            alert('網路連線或伺服器發生異常，請重試！');
        } finally {
            // 5. 最重要的一步：無論成功或失敗，都把動畫收起來，按鈕還原！
            loadingBox.style.display = 'none';
            btn.style.display = 'block';
            
            // 下載完後將表單自動清空
            form.reset(); 
        }
    }
</script>

</body>
</html>
