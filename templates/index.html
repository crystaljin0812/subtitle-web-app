<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subtitle Gen - Web</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #FDFBF7;
    font-family: -apple-system, "PingFang TC", "Helvetica Neue", sans-serif;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 560px; }
  h1 {
    font-family: "Arial Black", "Helvetica Neue", sans-serif;
    font-size: 34px;
    line-height: 1.05;
    margin: 0 0 4px;
  }
  .sub { color: #555; font-weight: 600; margin: 0 0 24px; }

  .card {
    border: 4px solid #000;
    border-radius: 24px;
    padding: 18px 20px 20px;
    margin-bottom: 22px;
    box-shadow: 7px 7px 0 #000;
  }
  .card.purple { background: #F4CCFF; }
  .card.yellow { background: #FFEB84; }
  .card.mint { background: #AEEBCB; }
  .card h2 {
    font-family: "Arial Black", "Helvetica Neue", sans-serif;
    font-size: 18px;
    margin: 0 0 12px;
  }
  label {
    display: block;
    font-weight: 700;
    font-size: 13px;
    margin: 10px 0 6px;
  }
  input[type="text"], input[type="password"], select {
    width: 100%;
    border: 3px solid #000;
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 14px;
    font-weight: 600;
    background: #fff;
    box-shadow: 3px 3px 0 #000;
  }
  input[type="file"] {
    width: 100%;
    font-weight: 600;
    font-size: 13px;
  }
  .file-status {
    font-size: 12px;
    font-weight: 700;
    margin-top: 6px;
    color: #444;
  }

  button {
    width: 100%;
    border: 4px solid #000;
    border-radius: 999px;
    background: #000;
    color: #AEEBCB;
    font-family: "Arial Black", "Helvetica Neue", sans-serif;
    font-size: 17px;
    padding: 18px 0;
    cursor: pointer;
    box-shadow: 7px 7px 0 #FFEB84;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  button:active:not(:disabled) {
    transform: translate(4px, 4px);
    box-shadow: 3px 3px 0 #FFEB84;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ===== 兩階段進度顯示 ===== */
  .stages {
    display: none;
    margin-top: 18px;
  }
  .stage-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    opacity: 0.35;
    transition: opacity 0.2s ease;
  }
  .stage-row.active, .stage-row.done { opacity: 1; }
  .stage-icon {
    width: 30px; height: 30px;
    border: 3px solid #000;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .stage-row.done .stage-icon { background: #AEEBCB; }
  .stage-row.active .stage-icon { background: #FFEB84; }
  .stage-body { flex: 1; }
  .stage-title { font-size: 13px; font-weight: 800; }
  .progress-outer {
    border: 3px solid #000;
    border-radius: 999px;
    background: #fff;
    padding: 3px;
    box-shadow: 3px 3px 0 #000;
    margin-top: 4px;
  }
  .progress-inner {
    height: 10px;
    width: 0%;
    border-radius: 999px;
    background: #000;
    transition: width 0.3s ease;
  }
  .stage-row.done .progress-inner { background: #1a1a1a; }

  .error-box {
    display: none;
    margin-top: 14px;
    border: 3px solid #000;
    border-radius: 14px;
    background: #FFD3D3;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 5px 5px 0 #000;
  }
  .warning-box {
    display: none;
    margin-top: 10px;
    border: 3px solid #000;
    border-radius: 14px;
    background: #FFF3C4;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 700;
    box-shadow: 4px 4px 0 #000;
  }
  .done-box {
    display: none;
    margin-top: 14px;
    text-align: center;
  }
  .done-box a {
    display: inline-block;
    background: #000;
    color: #FFEB84;
    text-decoration: none;
    font-weight: 800;
    padding: 12px 24px;
    border-radius: 999px;
    border: 4px solid #000;
    box-shadow: 6px 6px 0 #AEEBCB;
  }
  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: #777;
    font-weight: 600;
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>GENERATED<br>CAPTIONS</h1>
  <p class="sub">Transform audio to text instantly.</p>

  <form id="subtitleForm">
    <div class="card purple">
      <h2>API KEYS</h2>
      <label for="api_key">Gemini API</label>
      <input type="password" id="api_key" name="api_key" required placeholder="輸入你的 Gemini API 金鑰" autocomplete="off">
    </div>

    <div class="card yellow">
      <h2>SETTINGS</h2>
      <label for="target_language">Target Language</label>
      <select id="target_language" name="target_language">
        <option value="繁體中文">繁體中文 (Traditional Chinese)</option>
        <option value="簡體中文">簡體中文 (Simplified Chinese)</option>
        <option value="English">English</option>
        <option value="日本語">日本語</option>
        <option value="한국어">한국어</option>
        <option value="original">維持原文 (No Translation)</option>
      </select>

      <label for="output_format">Output Format</label>
      <select id="output_format" name="output_format">
        <option value="srt">SRT (標準字幕檔)</option>
        <option value="txt">TXT (純文字逐字稿)</option>
      </select>
    </div>

    <div class="card mint">
      <h2>FILES</h2>
      <label for="video_file">Video / Audio File</label>
      <input type="file" id="video_file" name="video_file" accept="video/*,audio/*" required>
      <div class="file-status" id="fileStatus">尚未選擇檔案</div>
    </div>

    <button type="submit" id="submitBtn">PROCESS SUBTITLES</button>
  </form>

  <div class="stages" id="stages">
    <div class="stage-row" id="stageUpload">
      <div class="stage-icon">☁️</div>
      <div class="stage-body">
        <div class="stage-title" id="stageUploadTitle">上傳檔案至伺服器</div>
        <div class="progress-outer"><div class="progress-inner" id="barUpload"></div></div>
      </div>
    </div>
    <div class="stage-row" id="stageServer">
      <div class="stage-icon">🧠</div>
      <div class="stage-body">
        <div class="stage-title" id="stageServerTitle">辨識與翻譯中</div>
        <div class="progress-outer"><div class="progress-inner" id="barServer"></div></div>
      </div>
    </div>
    <p class="hint">整個處理是在伺服器背景進行的，上傳完成後可以放心切換到別的分頁或別的 App；但請不要整個關掉這個分頁或重新整理，不然會直接遺失這次的進度、也錯過自動下載（重新整理會回到全新的首頁）。</p>
  </div>

  <div class="warning-box" id="warningBox"></div>
  <div class="error-box" id="errorBox"></div>

  <div class="done-box" id="doneBox">
    <a id="downloadLink" href="#">下載字幕檔</a>
    <p class="hint">已自動幫你開始下載，如果沒反應可以點上面這個按鈕。</p>
  </div>
</div>

<script>
const form = document.getElementById('subtitleForm');
const videoInput = document.getElementById('video_file');
const fileStatus = document.getElementById('fileStatus');
const submitBtn = document.getElementById('submitBtn');

const stagesWrap = document.getElementById('stages');
const stageUpload = document.getElementById('stageUpload');
const stageServer = document.getElementById('stageServer');
const barUpload = document.getElementById('barUpload');
const barServer = document.getElementById('barServer');
const stageServerTitle = document.getElementById('stageServerTitle');

const errorBox = document.getElementById('errorBox');
const warningBox = document.getElementById('warningBox');
const doneBox = document.getElementById('doneBox');
const downloadLink = document.getElementById('downloadLink');

let pollTimer = null;
let autoDownloaded = false;

videoInput.addEventListener('change', () => {
  const f = videoInput.files[0];
  if (!f) { fileStatus.textContent = '尚未選擇檔案'; return; }
  const sizeMB = (f.size / (1024 * 1024)).toFixed(1);
  fileStatus.textContent = `已選擇：${f.name}（${sizeMB} MB）`;
});

function setStageState(row, state) {
  row.classList.remove('active', 'done');
  if (state) row.classList.add(state);
}

function resetUI() {
  errorBox.style.display = 'none';
  warningBox.style.display = 'none';
  doneBox.style.display = 'none';
  stagesWrap.style.display = 'block';
  barUpload.style.width = '0%';
  barServer.style.width = '0%';
  setStageState(stageUpload, null);
  setStageState(stageServer, null);
  stageServerTitle.textContent = '辨識與翻譯中';
  autoDownloaded = false;
}

function showError(msg) {
  clearInterval(pollTimer);
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  stagesWrap.style.display = 'none';
  submitBtn.disabled = false;
  submitBtn.textContent = 'PROCESS SUBTITLES';
}

function triggerAutoDownload(jobId) {
  if (autoDownloaded) return;
  autoDownloaded = true;
  const url = `/download/${jobId}`;
  downloadLink.href = url;
  const a = document.createElement('a');
  a.href = url;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ---------- 階段一：上傳（用 XHR 才能拿到即時上傳進度）----------
function uploadWithProgress(formData) {
  setStageState(stageUpload, 'active');
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/process');
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        barUpload.style.width = pct + '%';
      }
    };
    xhr.onload = () => {
      barUpload.style.width = '100%';
      setStageState(stageUpload, 'done');
      try {
        const data = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300) resolve(data);
        else reject(new Error(data.error || `伺服器錯誤（${xhr.status}）`));
      } catch (e) {
        reject(new Error('伺服器回應格式錯誤'));
      }
    };
    xhr.onerror = () => reject(new Error('上傳失敗，請確認網路狀況。'));
    xhr.send(formData);
  });
}

// ---------- 階段二：伺服器端輪詢 ----------
function pollStatus(jobId) {
  setStageState(stageServer, 'active');
  // 網址故意不記住 job_id：重新整理／重新打開一律回到乾淨首頁。

  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`/status/${jobId}`);
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        showError(data.error || '找不到這個處理工作，請重新上傳。');
        return;
      }
      const data = await res.json();
      const pct = data.progress || 0;
      barServer.style.width = pct + '%';
      stageServerTitle.textContent = `${data.message || '處理中...'}（${pct}%）`;

      if (data.warning) {
        warningBox.textContent = '⚠ ' + data.warning;
        warningBox.style.display = 'block';
      }

      if (data.status === 'done') {
        clearInterval(pollTimer);
        setStageState(stageServer, 'done');
        stagesWrap.style.display = 'none';
        doneBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'PROCESS SUBTITLES';
        triggerAutoDownload(jobId);
      } else if (data.status === 'error') {
        showError(data.message || '處理失敗，請再試一次。');
      }
    } catch (err) {
      showError('連線發生問題，請確認網路狀況後再試一次。');
    }
  }, 1500);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  resetUI();
  submitBtn.disabled = true;
  submitBtn.textContent = 'PROCESSING...';

  try {
    const formData = new FormData(form);
    const data = await uploadWithProgress(formData);
    pollStatus(data.job_id);
  } catch (err) {
    showError(err.message || '送出失敗，請再試一次。');
  }
});
</script>
</body>
</html>
