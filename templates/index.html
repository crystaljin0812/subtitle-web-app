<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle Gen - Web</title>
    <style>
        /* 基礎設定 */
        body {
            background-color: #FDFBF7;
            font-family: 'Helvetica', 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            color: #000;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* 標題設計 */
        h1 {
            font-size: 42px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        p.subtitle {
            font-weight: bold;
            color: #555;
            margin-bottom: 30px;
        }

        /* 大圓角黑框卡片 */
        .neo-card {
            border: 4px solid #000;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 6px 6px 0px #000;
        }
        .card-purple { background-color: #F4CCFF; }
        .card-yellow { background-color: #FFEB84; }
        .card-blue { background-color: #B4D4FF; } /* 新增的設定卡片顏色 */

        .neo-card h2 {
            margin-top: 0;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* 輸入框與下拉選單設計 */
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            margin-top: 16px;
        }
        input[type="text"], input[type="file"], select {
            width: 100%;
            padding: 12px;
            border: 3px solid #000;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            box-sizing: border-box;
            background-color: #FFF;
        }
        input[type="file"], select {
            cursor: pointer;
        }

        /* 黑膠囊按鈕 */
        .submit-btn {
            width: 100%;
            background-color: #000;
            color: #AEEBCB;
            border: none;
            border-radius: 50px;
            padding: 20px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .submit-btn:hover {
            background-color: #333;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px #AEEBCB;
        }
        .submit-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* 斑馬線進度條 */
        #loading-container {
            display: none; 
            margin-top: 20px;
        }
        .progress-box {
            border: 4px solid #000;
            border-radius: 50px;
            overflow: hidden;
            background-color: #FFF;
            height: 40px;
        }
        .progress-bar {
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #AEEBCB,
                #AEEBCB 15px,
                #000 15px,
                #000 30px
            );
            animation: move-stripes 1s linear infinite;
        }
        @keyframes move-stripes {
            0% { background-position: 0 0; }
            100% { background-position: 42.42px 0; }
        }
        .loading-text {
            text-align: center;
            font-weight: 900;
            font-size: 14px;
            margin-top: 12px;
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Generated<br>Captions</h1>
    <p class="subtitle">Transform audio to text instantly.</p>

    <form id="upload-form" onsubmit="handleFormSubmit(event)">
        
        <!-- API 卡片 -->
        <div class="neo-card card-purple">
            <h2>API Keys</h2>
            <label>Gemini API</label>
            <input type="text" name="api_key" placeholder="AIzaSy..." required>
        </div>

        <!-- 進階設定卡片 -->
        <div class="neo-card card-blue">
            <h2>Settings</h2>
            
            <label>Target Language</label>
            <select name="target_language">
                <option value="繁體中文">繁體中文 (Traditional Chinese)</option>
                <option value="簡體中文">簡體中文 (Simplified Chinese)</option>
                <option value="English">English</option>
                <option value="日本語">日本語</option>
                <option value="한국어">한국어</option>
                <option value="original">維持原文 (No Translation)</option>
            </select>

            <label>Output Format</label>
            <select name="output_format">
                <option value="srt">SRT (標準字幕檔)</option>
                <option value="txt">TXT (純文字逐字稿)</option>
            </select>
        </div>

        <!-- 檔案卡片 -->
        <div class="neo-card card-yellow">
            <h2>Files</h2>
            <label>Video / Audio File</label>
            <input type="file" name="video_file" accept="video/*,audio/*" required>
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">PROCESS SUBTITLES</button>
        
        <div id="loading-container">
            <div class="progress-box">
                <div class="progress-bar"></div>
            </div>
            <p class="loading-text">PROCESSING... DO NOT CLOSE THIS PAGE</p>
        </div>

    </form>
</div>

<script>
    let isProcessing = false;

    window.addEventListener('beforeunload', function (e) {
        if (isProcessing) {
            e.preventDefault();
            e.returnValue = '影片正在處理中，離開將會中斷進度，確定要離開嗎？'; 
        }
    });

    async function handleFormSubmit(event) {
        event.preventDefault(); 

        const form = document.getElementById('upload-form');
        const btn = document.getElementById('submit-btn');
        const loadingBox = document.getElementById('loading-container');

        btn.style.display = 'none';
        loadingBox.style.display = 'block';
        isProcessing = true;

        try {
            const formData = new FormData(form);
            const response = await fetch('/process', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                alert('發生錯誤：' + errorText);
            } else {
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');

                // 動態從伺服器抓取正確的檔名 (包含 .txt 或 .srt)
                let filename = "download_file"; 
                const disposition = response.headers.get('content-disposition');
                if (disposition && disposition.indexOf('filename=') !== -1) {
                    const matches = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/.exec(disposition);
                    if (matches != null && matches[1]) {
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }

                a.href = downloadUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove(); 
                window.URL.revokeObjectURL(downloadUrl); 
            }
        } catch (error) {
            alert('網路連線中斷或伺服器異常！請保持網頁開啟並確保網路穩定。');
        } finally {
            loadingBox.style.display = 'none';
            btn.style.display = 'block';
            isProcessing = false; 
            
            form.reset(); 
        }
    }
</script>

</body>
</html>
