<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subtitle Gen - Web</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #FDFBF7;
    font-family: -apple-system, "PingFang TC", "Helvetica Neue", sans-serif;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 560px; }
  h1 {
    font-family: "Arial Black", "Helvetica Neue", sans-serif;
    font-size: 34px;
    line-height: 1.05;
    margin: 0 0 4px;
  }
  .sub { color: #555; font-weight: 600; margin: 0 0 24px; }

  /* ===== 硬邊位移陰影（neo-brutalism 招牌手法）===== */
  .card {
    border: 4px solid #000;
    border-radius: 24px;
    padding: 18px 20px 20px;
    margin-bottom: 22px;
    box-shadow: 7px 7px 0 #000;
  }
  .card.purple { background: #F4CCFF; }
  .card.yellow { background: #FFEB84; }
  .card.mint { background: #AEEBCB; }
  .card h2 {
    font-family: "Arial Black", "Helvetica Neue", sans-serif;
    font-size: 18px;
    margin: 0 0 12px;
  }
  label {
    display: block;
    font-weight: 700;
    font-size: 13px;
    margin: 10px 0 6px;
  }
  input[type="text"], input[type="password"], select {
    width: 100%;
    border: 3px solid #000;
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 14px;
    font-weight: 600;
    background: #fff;
    box-shadow: 3px 3px 0 #000;
  }
  input[type="file"] {
    width: 100%;
    font-weight: 600;
    font-size: 13px;
  }
  .file-row { display: flex; gap: 10px; margin-bottom: 14px; }

  button {
    width: 100%;
    border: 4px solid #000;
    border-radius: 999px;
    background: #000;
    color: #AEEBCB;
    font-family: "Arial Black", "Helvetica Neue", sans-serif;
    font-size: 17px;
    padding: 18px 0;
    cursor: pointer;
    box-shadow: 7px 7px 0 #FFEB84;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  button:active:not(:disabled) {
    transform: translate(4px, 4px);
    box-shadow: 3px 3px 0 #FFEB84;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .progress-wrap {
    display: none;
    margin-top: 16px;
  }
  .progress-outer {
    border: 3px solid #000;
    border-radius: 999px;
    background: #fff;
    padding: 3px;
    box-shadow: 4px 4px 0 #000;
  }
  .progress-inner {
    height: 14px;
    width: 0%;
    border-radius: 999px;
    background: #000;
    transition: width 0.4s ease;
  }
  .progress-label {
    margin-top: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #333;
  }
  .error-box {
    display: none;
    margin-top: 14px;
    border: 3px solid #000;
    border-radius: 14px;
    background: #FFD3D3;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 5px 5px 0 #000;
  }
  .warning-box {
    display: none;
    margin-top: 10px;
    border: 3px solid #000;
    border-radius: 14px;
    background: #FFF3C4;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 700;
    box-shadow: 4px 4px 0 #000;
  }
  .done-box {
    display: none;
    margin-top: 14px;
    text-align: center;
  }
  .done-box a {
    display: inline-block;
    background: #000;
    color: #FFEB84;
    text-decoration: none;
    font-weight: 800;
    padding: 12px 24px;
    border-radius: 999px;
    border: 4px solid #000;
    box-shadow: 6px 6px 0 #AEEBCB;
  }
  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: #777;
    font-weight: 600;
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>GENERATED<br>CAPTIONS</h1>
  <p class="sub">Transform audio to text instantly.</p>

  <form id="subtitleForm">
    <div class="card purple">
      <h2>API KEYS</h2>
      <label for="api_key">Gemini API</label>
      <input type="password" id="api_key" name="api_key" required placeholder="輸入你的 Gemini API 金鑰">
    </div>

    <div class="card yellow">
      <h2>SETTINGS</h2>
      <label for="target_language">Target Language</label>
      <select id="target_language" name="target_language">
        <option value="繁體中文">繁體中文 (Traditional Chinese)</option>
        <option value="簡體中文">簡體中文 (Simplified Chinese)</option>
        <option value="English">English</option>
        <option value="日本語">日本語</option>
        <option value="한국어">한국어</option>
        <option value="original">維持原文 (No Translation)</option>
      </select>

      <label for="output_format">Output Format</label>
      <select id="output_format" name="output_format">
        <option value="srt">SRT (標準字幕檔)</option>
        <option value="txt">TXT (純文字逐字稿)</option>
      </select>
    </div>

    <div class="card mint">
      <h2>FILES</h2>
      <label for="video_file">Video / Audio File</label>
      <input type="file" id="video_file" name="video_file" accept="video/*,audio/*" required>
    </div>

    <button type="submit" id="submitBtn">PROCESS SUBTITLES</button>
  </form>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-outer">
      <div class="progress-inner" id="progressBar"></div>
    </div>
    <p class="progress-label" id="progressLabel">準備中...</p>
    <p class="hint">處理是在伺服器背景進行的，你可以放心切換到別的分頁或別的 App，等等再回來看這頁就好（請不要整個關掉分頁，不然會錯過自動下載）。</p>
  </div>

  <div class="warning-box" id="warningBox"></div>
  <div class="error-box" id="errorBox"></div>

  <div class="done-box" id="doneBox">
    <a id="downloadLink" href="#">下載字幕檔</a>
    <p class="hint" id="autoDownloadHint">已自動幫你開始下載，如果沒反應可以點上面這個按鈕。</p>
  </div>
</div>

<script>
const form = document.getElementById('subtitleForm');
const submitBtn = document.getElementById('submitBtn');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const errorBox = document.getElementById('errorBox');
const warningBox = document.getElementById('warningBox');
const doneBox = document.getElementById('doneBox');
const downloadLink = document.getElementById('downloadLink');

let pollTimer = null;
let autoDownloaded = false;

function resetUI() {
  errorBox.style.display = 'none';
  warningBox.style.display = 'none';
  doneBox.style.display = 'none';
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';
  progressLabel.textContent = '準備中...';
  autoDownloaded = false;
}

function showError(msg) {
  clearInterval(pollTimer);
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  progressWrap.style.display = 'none';
  submitBtn.disabled = false;
  submitBtn.textContent = 'PROCESS SUBTITLES';
}

function triggerAutoDownload(jobId) {
  if (autoDownloaded) return;
  autoDownloaded = true;
  const url = `/download/${jobId}`;
  downloadLink.href = url;
  // 用隱藏連結自動觸發下載，不需要使用者手動點擊
  const a = document.createElement('a');
  a.href = url;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function pollStatus(jobId) {
  // 把工作編號記在網址上，這樣就算把分頁關掉，只要之後重新打開同一個網址
  // （例如從瀏覽紀錄點回來），頁面還是能繼續顯示這個工作的進度或下載連結。
  const newUrl = `${window.location.pathname}?job=${jobId}`;
  window.history.replaceState({ jobId }, '', newUrl);

  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`/status/${jobId}`);
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        showError(data.error || '找不到這個處理工作，請重新上傳。');
        return;
      }
      const data = await res.json();

      const pct = data.progress || 0;
      progressBar.style.width = pct + '%';
      progressLabel.textContent = `${data.message || '處理中...'}（${pct}%）`;

      if (data.warning) {
        warningBox.textContent = '⚠ ' + data.warning;
        warningBox.style.display = 'block';
      }

      if (data.status === 'done') {
        clearInterval(pollTimer);
        progressWrap.style.display = 'none';
        doneBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'PROCESS SUBTITLES';
        triggerAutoDownload(jobId);
      } else if (data.status === 'error') {
        showError(data.message || '處理失敗，請再試一次。');
      }
    } catch (err) {
      showError('連線發生問題，請確認網路狀況後再試一次。');
    }
  }, 1500);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  resetUI();
  submitBtn.disabled = true;
  submitBtn.textContent = 'PROCESSING...';

  const formData = new FormData(form);

  try {
    const res = await fetch('/process', { method: 'POST', body: formData });
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || '送出失敗，請再試一次。');
      submitBtn.disabled = false;
      submitBtn.textContent = 'PROCESS SUBTITLES';
      return;
    }

    pollStatus(data.job_id);
  } catch (err) {
    showError('送出失敗，請確認網路狀況後再試一次。');
    submitBtn.disabled = false;
    submitBtn.textContent = 'PROCESS SUBTITLES';
  }
});

// 如果網址上已經帶有 job 參數（例如使用者重新打開先前的分頁），
// 自動接續顯示該工作的狀態，不用重新上傳一次。
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const existingJob = params.get('job');
  if (existingJob) {
    resetUI();
    submitBtn.disabled = true;
    submitBtn.textContent = 'PROCESSING...';
    pollStatus(existingJob);
  }
});
</script>
</body>
</html>
